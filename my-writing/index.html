<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 아지트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 왼쪽 세션: 메인 캘린더 -->
        <main class="calendar-section">
            <div class="calendar-header">
                <button id="prev-month">&lt;</button>
                <h2 id="current-month-year">2026년 7월</h2>
                <button id="next-month">&gt;</button>
            </div>
            
            <!-- 캘린더 그리드 -->
            <div class="calendar-grid">
                <!-- 요일 행 -->
                <div class="day-label">일</div>
                <div class="day-label">월</div>
                <div class="day-label">화</div>
                    <div class="day-label">수</div>
                <div class="day-label">목</div>
                <div class="day-label">금</div>
                <div class="day-label">토</div>
                
                <!-- 날짜들이 자바스크립트로 채워질 공간입니다. (임시 데이터 배치) -->
                <div class="calendar-day empty"></div>
                <div class="calendar-day empty"></div>
                <div class="calendar-day empty"></div>
                <div class="calendar-day empty"></div>
                <div class="calendar-day">1</div>
                <div class="calendar-day">2</div>
                <div class="calendar-day active">3</div> <!-- 선택된 날짜 예시 -->
                <!-- ... 생략 ... -->
            </div>
        </main>

        <!-- 오른쪽 세션: 날짜별 기록창 (일기장, 가계부, 할 일) -->
        <aside class="record-section">
            <div class="record-header">
                <h3>2026년 7월 3일의 기록</h3>
            </div>
            
            <!-- 기능별 탭 메뉴 -->
            <nav class="record-tabs">
                <button class="tab-btn active" data-tab="diary">일기장</button>
                <button class="tab-btn" data-tab="account">가계부</button>
                <button class="tab-btn" data-tab="todo">할 일</button>
            </nav>

            <!-- 탭 콘텐츠 내용 -->
            <div class="tab-content">
                <!-- 1. 일기장 (오늘/어제만 작성 가능하도록 JS로 제한할 예정) -->
                <div id="diary" class="tab-pane active">
                    <span class="notice-tag">오늘/어제만 기록 가능</span>
                    <textarea placeholder="오늘과 어제의 이야기를 기록해보세요..."></textarea>
                    <button class="save-btn">저장하기</button>
                </div>

                <!-- 2. 가계부 (추후 구현) -->
                <div id="account" class="tab-pane">
                    <p class="placeholder-text">💸 가계부 기능은 곧 추가됩니다!</p>
                </div>

                <!-- 3. 할 일 목록 (추후 구현) -->
                <div id="todo" class="tab-pane">
                    <p class="placeholder-text">✅ 할 일 목록 기능은 곧 추가됩니다!</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- 왼쪽 아래 숨겨진 메모장 -->
    <div class="hidden-memo" id="hidden-memo">
        <div class="memo-header">
            <span>📝 언제든 적는 메모</span>
            <button id="toggle-memo-btn">접기</button>
        </div>
        <textarea placeholder="캘린더와 별개로 자유롭게 낙서하는 공간입니다..."></textarea>
    </div>

    <!-- 자바스크립트 파일 연결 (나중에 작성) -->
    <script src="script.js"></script>
</body>
</html>
