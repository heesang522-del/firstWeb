<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 아지트 - 로그인</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="auth.css">

    <script src="auth.js" defer></script>
</head>

<body>
    <div class="auth-container">
        <!-- 상단 타이틀 -->
        <div class="auth-header">            
            <h2><i class="fa-solid fa-campground"></i> 나만의 아지트</h2>
            <p>소중한 나를 안전하게 보호합니다.</p>
        </div>

        <!-- 폼 전환 탭 -->
        <div class="auth-tabs">
            <button class="auth-tab-btn active" id="tab-login">로그인</button>
            <button class="auth-tab-btn" id="tab-register">회원가입</button>
        </div>

        <!-- 1. 로그인 폼 -->
        <form id="login-form" class="auth-form active">
            <div class="input-group">
                <label for="login-id">아이디</label>
                <input type="text" id="login-id" required placeholder="아이디를 입력하세요">
            </div>
            <div class="input-group">
                <label for="login-pw">비밀번호</label>
                <input type="password" id="login-pw" required placeholder="비밀번호를 입력하세요">
            </div>
            <button type="submit" class="auth-submit-btn">안전하게 로그인</button>
        </form>

        <!-- 2. 회원가입 폼 -->
        <form id="register-form" class="auth-form">
            <div class="input-group">
                <label for="reg-id">아이디</label>
                <input type="text" id="reg-id" required minlength="4" placeholder="4자 이상 입력하세요">
            </div>
            <div class="input-group">
                <label for="reg-pw">비밀번호</label>
                <input type="password" id="reg-pw" required minlength="8" placeholder="8자 이상, 숫자/특수문자 포함">
                <small class="helper-text">보안을 위해 강력한 비밀번호를 권장합니다.</small>
            </div>
            <div class="input-group">
                <label for="reg-pw-confirm">비밀번호 확인</label>
                <input type="password" id="reg-pw-confirm" required placeholder="비밀번호를 한 번 더 입력하세요">
            </div>
            <button type="submit" class="auth-submit-btn register">회원가입 완료</button>
        </form>
    </div>    
</body>

</html>
